    <header></header>
    <div id="particleContainer"></div>
    <div id="pickaxe-cursor"></div>
    <div class="mining-progress-container" id="miningProgress">
        <div class="mining-progress-bar" id="miningProgressBar"></div>
    </div>
    <main>
        <div class="error-container" id="errorContainer">
            <div class="blocks-404">
                <div class="blocks-row">
                    <div class="block-digit">
                        <div class="cube mineable-block" id="block0" data-block="0">
                            <div class="cube-face cube-front"></div>
                            <div class="cube-face cube-back"></div>
                            <div class="cube-face cube-right"></div>
                            <div class="cube-face cube-left"></div>
                            <div class="cube-face cube-top"></div>
                            <div class="cube-face cube-bottom"></div>
                        </div>
                        <div class="block-label">4</div>
                    </div>
                    <div class="block-digit">
                        <div class="cube mineable-block" id="block1" data-block="1">
                            <div class="cube-face cube-front"></div>
                            <div class="cube-face cube-back"></div>
                            <div class="cube-face cube-right"></div>
                            <div class="cube-face cube-left"></div>
                            <div class="cube-face cube-top"></div>
                            <div class="cube-face cube-bottom"></div>
                        </div>
                        <div class="block-label">0</div>
                    </div>
                    <div class="block-digit">
                        <div class="cube mineable-block" id="block2" data-block="2">
                            <div class="cube-face cube-front"></div>
                            <div class="cube-face cube-back"></div>
                            <div class="cube-face cube-right"></div>
                            <div class="cube-face cube-left"></div>
                            <div class="cube-face cube-top"></div>
                            <div class="cube-face cube-bottom"></div>
                        </div>
                        <div class="block-label">4</div>
                    </div>
                </div>
            </div>
            <h1 class="error-title" id="errorTitle" data-i18n="404_title"></h1>
            <p class="error-subtitle" id="errorSubtitle" data-i18n="404_subtitle"></p>
            <p class="error-description" id="errorDescription" data-i18n="404_description"></p>
            <a href="/" class="error-cta">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span data-i18n="404_return_to_spawn"></span>
            </a>
            <div class="mining-stats" id="miningStats" style="display:none;">
                <div class="stat-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--mining-green)">
                        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                    <span data-i18n="404_blocks_destroyed"></span><span id="blocksDestroyed">0</span>
                </div>
            </div>
            <div class="easter-egg" id="easterEgg" title="Psst… try clicking!">
                <img src="/assets/global/404/pickaxe.png" alt="" width="25">
            </div>
